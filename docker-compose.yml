name: wiki-stream-analytics

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: wsa-kafka
    ports:
      - "29092:29092" # external listener for host tools/debugging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: wsa-postgres
    ports:
      - "5433:5432" # 5433 on host — avoids clash with local PostgreSQL on 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init/00_create_airflow_db.sh:/docker-entrypoint-initdb.d/00_create_airflow_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiki} -d ${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: wsa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    container_name: wsa-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-wiki.recentchange}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-wiki.recentchange.dlq}
      SSE_URL: ${SSE_URL:-https://stream.wikimedia.org/v2/stream/recentchange}
      SSE_USER_AGENT: ${SSE_USER_AGENT:-wiki-stream-analytics/0.1 (https://github.com/TikshiKE/wiki-stream-analytics; evgeny.kren.engineer@gmail.com)}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: services/consumer/Dockerfile
    container_name: wsa-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-wiki.recentchange}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-pg-writer}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      producer:
        condition: service_started
    restart: unless-stopped

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: wsa-kafka-ui
    ports:
      - "8088:8080" # 8080 is reserved for Airflow (stage 4)
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: wsa-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-wiki}@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: utc
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-JkYb-hzyrIph-CdbTYMQRr9wlHOKZlkZhq_fEL5L2Io=}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      DBT_TARGET: ${DBT_TARGET:-dev}
      RETENTION_DAYS: ${RETENTION_DAYS:-14}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      consumer:
        condition: service_started
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: standalone
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: wsa-dashboard
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_RO_USER: ${POSTGRES_RO_USER:-wiki_ro}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD:-wiki_ro}
      REDIS_URL: redis://redis:6379/0
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-https://github.com/TikshiKE/wiki-stream-analytics}
      LIVE_REFRESH_SECONDS: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      consumer:
        condition: service_started
    restart: unless-stopped

volumes:
  kafka_data:
  pg_data:
  airflow_logs:
