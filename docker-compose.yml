name: wiki-stream-analytics

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: wsa-kafka
    ports:
      - "29092:29092" # external listener for host tools/debugging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: wsa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiki} -d ${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: wsa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    container_name: wsa-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-wiki.recentchange}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-wiki.recentchange.dlq}
      SSE_URL: ${SSE_URL:-https://stream.wikimedia.org/v2/stream/recentchange}
      SSE_USER_AGENT: ${SSE_USER_AGENT:-wiki-stream-analytics/0.1 (https://github.com/TikshiKE/wiki-stream-analytics; evgeny.kren.engineer@gmail.com)}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: wsa-kafka-ui
    ports:
      - "8088:8080" # 8080 is reserved for Airflow (stage 4)
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  pg_data:
